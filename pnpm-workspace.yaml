overrides:
  '@tootallnate/once@<3.0.1': '>=3.0.1'
  # Patch the brace-expansion ReDoS without bumping minor majors:
  # 1.x → ≥1.1.13 (latest 1.x); 2.x → ≥2.0.2 (latest 2.x). Without the
  # major bound, pnpm hoists everything to brace-expansion@5 which is
  # API-incompatible with minimatch@3 (used by ESLint flat config).
  brace-expansion@<1.1.13: '>=1.1.13 <2'
  brace-expansion@>=2.0.0 <2.0.2: '>=2.0.2 <3'
  lodash-es@<=4.17.23: '>=4.18.0'
  lodash-es@>=4.0.0 <=4.17.22: '>=4.17.23'
  lodash-es@>=4.0.0 <=4.17.23: '>=4.18.0'
  lodash@<=4.17.23: '>=4.18.0'
  lodash@>=4.0.0 <=4.17.22: '>=4.17.23'
  lodash@>=4.0.0 <=4.17.23: '>=4.18.0'
  minimatch@<3.1.3: '>=3.1.3'
  minimatch@<3.1.4: '>=3.1.4'
  picomatch@<2.3.2: '>=2.3.2'
  picomatch@>=4.0.0 <4.0.4: '>=4.0.4'
  postcss@<8.5.10: '>=8.5.10'
  rollup@>=4.0.0 <4.59.0: '>=4.59.0'
  tar@<7.5.7: '>=7.5.7'
  tar@<7.5.8: '>=7.5.8'
  tar@<=7.5.10: '>=7.5.11'
  tar@<=7.5.2: '>=7.5.3'
  tar@<=7.5.3: '>=7.5.4'
  tar@<=7.5.9: '>=7.5.10'

minimumReleaseAge: 7200

allowBuilds:
  canvas: true
  esbuild: true
  sharp: true
